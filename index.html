<title>Alarmas Reset — Cotizaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070709;
  --surface: #0f0f14;
  --card: #141419;
  --border: #1f1f2c;
  --border2: #2a2a3c;
  --cyan: #00e5c8;
  --cyan2: rgba(0,229,200,0.12);
  --orange: #ff6030;
  --orange2: rgba(255,96,48,0.12);
  --gold: #f0c040;
  --purple: #9060ff;
  --text: #e8e8f0;
  --muted: #5a5a72;
  --muted2: #3a3a4e;
  --green-wa: #25D366;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  font-family:'Syne',sans-serif;
  color:var(--text);
  min-height:100vh;
  padding-bottom:100px;
  overflow-x:hidden;
}

/* NOISE OVERLAY */
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

.page{max-width:480px;margin:0 auto;padding:0 14px;position:relative;z-index:1;}

/* ── HEADER ── */
.header{
  padding:16px 0 0;
  margin-bottom:4px;
  position:relative;
}
.header-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--cyan2);border:1px solid rgba(0,229,200,.25);
  border-radius:100px;padding:4px 12px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--cyan);text-transform:uppercase;margin-bottom:12px;
}
.header-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.header-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;letter-spacing:2px;line-height:1;
  color:#fff;margin-bottom:2px;
}
.header-logo em{color:var(--cyan);font-style:normal;}
.header-sub{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:.5px;margin-bottom:16px;}
.header-contact{
  display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;
}
.contact-chip{
  display:flex;align-items:center;gap:4px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:4px 8px;
  font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);
  text-decoration:none;transition:border-color .2s,color .2s;
}
.contact-chip:hover{border-color:var(--cyan);color:var(--cyan);}
.contact-chip svg{width:11px;height:11px;flex-shrink:0;}
.catalog-chip{
  background:linear-gradient(135deg,#25D366,#128C7E)!important;
  border-color:transparent!important;
  color:#fff!important;
  font-weight:700!important;
  font-size:10px!important;
}
/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:16px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none;}
#searchInput{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px 9px 32px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:12px;
  outline:none;transition:border-color .2s;
}
#searchInput:focus{border-color:var(--cyan);}
#searchInput::placeholder{color:var(--muted);}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex-shrink:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:6px 14px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab.active{background:var(--cyan2);border-color:var(--cyan);color:var(--cyan);}

/* ── CARDS ── */
.category-section{margin-bottom:28px;}
.category-label{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-bottom:10px;
  padding-left:2px;
}
.cards-grid{display:flex;flex-direction:column;gap:8px;}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:12px;cursor:pointer;transition:border-color .15s,background .15s;
  position:relative;
}
.card:hover{border-color:var(--border2);background:#17171e;}
.card.active{border-color:var(--cyan);background:rgba(0,229,200,.04);}
.card-left{flex:1;min-width:0;}
.card-name{
  font-size:13px;font-weight:700;color:var(--text);
  margin-bottom:4px;line-height:1.3;
}
.card-desc{
  font-size:11px;color:var(--muted);line-height:1.5;
  white-space:pre-wrap;word-break:break-word;
}
.card-right{
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;
}
.card-price{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;
  color:var(--cyan);white-space:nowrap;
}
.card-price.orange{color:var(--orange);}
.card-price.gold{color:var(--gold);}
.card-price.purple{color:var(--purple);}

/* ── SELECT INDICATOR ── */
.select-ring{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.card.active .select-ring{background:var(--cyan);border-color:var(--cyan);}
.select-ring svg{width:11px;height:11px;color:#000;opacity:0;transition:opacity .15s;}
.card.active .select-ring svg{opacity:1;}

/* ── EXPANDED DETAIL ── */
.card-detail{
  overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s;
  padding:0 16px;
}
.card.active .card-detail{max-height:600px;padding:0 16px 14px;}
.detail-inner{
  border-top:1px solid var(--border);padding-top:12px;margin-top:2px;
}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;}
.detail-row .label{color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;}
.detail-row .value{color:var(--text);font-weight:600;text-align:right;}
.detail-note{
  margin-top:8px;padding:8px 10px;
  background:rgba(0,229,200,.06);border:1px solid rgba(0,229,200,.15);
  border-radius:8px;font-size:10px;color:var(--muted);line-height:1.5;
}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(7,7,9,.92);border-top:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:10px 14px 14px;z-index:100;
}
.bottom-inner{max-width:480px;margin:0 auto;}

/* ── QUOTE FORM (expandable) ── */
.quote-form{
  overflow:hidden;max-height:0;transition:max-height .35s ease;
}
.quote-form.open{max-height:700px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.form-field{display:flex;flex-direction:column;gap:4px;}
.form-field.full{grid-column:1/-1;}
.form-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.form-input{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:12px;
  outline:none;transition:border-color .2s;width:100%;
}
.form-input:focus{border-color:var(--cyan);}
.form-input::placeholder{color:var(--muted2);}

/* ── PROGRESS BAR ── */
.progress-wrap{margin-bottom:10px;}
.progress-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:4px;letter-spacing:1px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .4s ease;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:8px;align-items:center;}
.btn-quote{
  flex:1;
  background:var(--cyan2);border:1px solid var(--cyan);
  border-radius:10px;padding:11px;
  color:var(--cyan);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
  cursor:pointer;transition:all .2s;text-align:center;
}
.btn-quote:hover{background:var(--cyan);color:#000;}
.btn-wa{
  background:linear-gradient(135deg,#25D366,#128C7E);
  border:none;border-radius:10px;padding:11px 18px;
  color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
  cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:6px;
}
.btn-wa:hover{opacity:.85;}
.btn-wa svg{width:16px;height:16px;}

/* ── SAVED LIST ── */
.saved-section{margin-bottom:24px;}
.saved-list{display:flex;flex-direction:column;gap:6px;}
.saved-item{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.saved-item-info{flex:1;min-width:0;}
.saved-item-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.saved-item-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.saved-item-price{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--cyan);flex-shrink:0;}
.btn-remove{
  background:none;border:none;color:var(--muted2);cursor:pointer;
  padding:2px;line-height:0;transition:color .2s;flex-shrink:0;
}
.btn-remove:hover{color:var(--orange);}
.empty-state{
  text-align:center;padding:24px 0;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);
}

/* ── SHARE BOX ── */
.share-box{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:10px;display:none;
}
.share-box.visible{display:block;}
.share-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.share-text{
  font-size:11px;color:var(--text);line-height:1.6;white-space:pre-wrap;
  word-break:break-word;margin-bottom:10px;
}
.share-actions{display:flex;gap:6px;}
.btn-copy{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;
  cursor:pointer;transition:all .2s;
}
.btn-copy:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-copy.copied{border-color:var(--cyan);color:var(--cyan);}

/* ── TABS (saved / catálogo) ── */
.view-tabs{display:flex;gap:6px;margin-bottom:14px;}
.view-tab{
  flex:1;text-align:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  cursor:pointer;transition:all .2s;
}
.view-tab.active{background:var(--cyan2);border-color:var(--cyan);color:var(--cyan);}

/* ── TOTALS ── */
.total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-top:1px solid var(--border);margin-top:6px;
}
.total-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.total-value{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--cyan);}
</style>
</head>
<body>

<div class="header">

</div><!-- /page -->

/* ── CATEGORY TABS ── */
function renderCategoryTabs(){
  const cats = ['Todos', ...new Set(SERVICES.map(s=>s.cat))];
  document.getElementById('categoryTabs').innerHTML = cats.map(c=>
    `<div class="tab${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${esc(c)}</div>`
  ).join('');
}
function setCategory(c){ activeCategory=c; renderCategoryTabs(); renderCatalog(); }

/* ── CATALOG ── */
function renderCatalog(){
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  let list = SERVICES;
  if(activeCategory!=='Todos') list = list.filter(s=>s.cat===activeCategory);
  if(q) list = list.filter(s=>
    s.name.toLowerCase().includes(q)||
    s.desc.toLowerCase().includes(q)||
    s.cat.toLowerCase().includes(q)
  );

  const byCat = {};
  list.forEach(s=>{ (byCat[s.cat]=byCat[s.cat]||[]).push(s); });

  const isSaved = id => saved.some(s=>s.id===id);

  document.getElementById('catalogContainer').innerHTML = Object.entries(byCat).map(([cat,items])=>`
    <div class="category-section">
      <div class="category-label">${esc(cat)}</div>
      <div class="cards-grid">
        ${items.map(s=>`
          <div class="card${activeCard===s.id?' active':''}" id="card_${s.id}" onclick="toggleCard('${s.id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;width:100%;">
              <div class="card-left">
                <div class="card-name">${esc(s.name)}</div>
                <div class="card-desc">${esc(s.desc)}</div>
              </div>
              <div class="card-right">
                <div class="card-price ${s.color||'cyan'}">${fmtPrice(s.price)}</div>
                <div class="select-ring">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                </div>
              </div>
            </div>
            <div class="card-detail">
              <div class="detail-inner">
                ${(s.details||[]).map(d=>`<div class="detail-row"><span class="label">${esc(d.l)}</span><span class="value">${esc(d.v)}</span></div>`).join('')}
                ${s.note?`<div class="detail-note">${esc(s.note)}</div>`:''}
                <div style="margin-top:12px;display:flex;gap:8px;">
                  <button onclick="event.stopPropagation();addToSaved('${s.id}')" style="flex:1;background:var(--cyan2);border:1px solid var(--cyan);border-radius:8px;padding:8px;color:var(--cyan);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;">
                    ${isSaved(s.id)?'✓ Guardado':'+ Guardar'}

}

function toggleCard(id){
  activeCard = activeCard===id ? null : id;
  renderCatalog();
  if(activeCard){
    setTimeout(()=>{
      const el = document.getElementById('card_'+id);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  }
}

/* ── SAVED ── */
function addToSaved(id){
  const svc = SERVICES.find(s=>s.id===id);
  if(!svc) return;
  if(!saved.some(s=>s.id===id)){
    saved.push(svc);
    localStorage.setItem('savedServices', JSON.stringify(saved));
  }
  renderSavedList();
  updateShareBox(saved);
  renderCatalog();
  updateSavedCount();
}

function removeFromSaved(id){
  saved = saved.filter(s=>s.id!==id);
  localStorage.setItem('savedServices', JSON.stringify(saved));
  renderSavedList();
  updateShareBox(saved);
  renderCatalog();
  updateSavedCount();
}

function updateSavedCount(){
  const el = document.getElementById('savedCount');
  if(el) el.textContent = saved.length ? `(${saved.length})` : '';
}

function renderSavedList(){
  const list = document.getElementById('savedList');
  const empty = document.getElementById('savedEmpty');
  const totalRow = document.getElementById('totalRow');
  const totalVal = document.getElementById('totalValue');
  if(!list) return;
  updateSavedCount();
  if(saved.length===0){
    list.innerHTML=''; empty.style.display='block';
    totalRow.style.display='none';
    document.getElementById('bottomBar').style.display='none';
    return;
  }
  empty.style.display='none';
  totalRow.style.display='flex';
  const total = saved.reduce((a,s)=>a+s.price,0);
  totalVal.textContent = fmtPrice(total);

  list.innerHTML = saved.map(s=>`
    <div class="saved-item">
      <div class="saved-item-info">
        <div class="saved-item-name">${esc(s.name)}</div>
        <div class="saved-item-sub">${esc(s.cat)}</div>
      </div>
      <div class="saved-item-price">${fmtPrice(s.price)}</div>
      <button class="btn-remove" onclick="removeFromSaved('${s.id}')" title="Quitar">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>`).join('');

  document.getElementById('bottomBar').style.display = 'block';
}

/* ── SHARE BOX ── */
function updateShareBox(services){
  const box  = document.getElementById('shareBox');
  const text = document.getElementById('shareText');
  if(!box||!text) return;
  if(!services||services.length===0){ box.classList.remove('visible'); return; }
  const total = services.reduce((a,s)=>a+s.price,0);
  const lines = [
    `🔐 *Cotización — ${CONFIG.nombre_negocio}*`,
    '',
    ...services.map(s=>`• ${s.name}: ${fmtPrice(s.price)}`),
    '',
    `*Total estimado: ${fmtPrice(total)}*`,
    '',
    '_Los precios son orientativos. Contactanos para confirmar disponibilidad y coordinar instalación._'
  ];
  text.textContent = lines.join('\n');
  box.classList.add('visible');
}

function copyShare(){
  const text = document.getElementById('shareText')?.textContent||'';
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('btnCopy');
    btn.textContent='¡Copiado!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copiar'; btn.classList.remove('copied'); },2000);
  });
}

/* ── BOTTOM FORM ── */
function toggleForm(){
  const form = document.getElementById('quoteForm');
  const isOpen = form.classList.contains('open');
  if(!isOpen){
    buildForm();
    form.classList.add('open');
    document.getElementById('progressWrap').style.display='block';
    document.getElementById('btnWA').style.display='flex';
    document.getElementById('btnQuote').textContent='Cerrar';
  } else {
    form.classList.remove('open');
    document.getElementById('progressWrap').style.display='none';
    document.getElementById('btnWA').style.display='none';
    document.getElementById('btnQuote').textContent='Cotizar';
  }
}

function buildForm(){
  /* Detect if single service or multiple */
  const isMulti = saved.length > 1;
  let html = '';
  if(!isMulti && saved.length===1){
    const s = saved[0];
    html = `
      <div class="form-field"><label class="form-label">Nombre</label><input class="form-input" id="f0_nombre" placeholder="Tu nombre"></div>
      <div class="form-field"><label class="form-label">Teléfono</label><input class="form-input" id="f0_tel" type="tel" placeholder="+54 9 11…"></div>
      <div class="form-field"><label class="form-label">Marca vehículo</label><input class="form-input" id="f0_marca" placeholder="Ej: Toyota"></div>
      <div class="form-field"><label class="form-label">Modelo</label><input class="form-input" id="f0_modelo" placeholder="Ej: Corolla 2022"></div>
      <div class="form-field full"><label class="form-label">Notas adicionales</label><input class="form-input" id="f0_notas" placeholder="Consulta, dirección, etc."></div>
    `;
  } else {
    html = `
      <div class="form-field"><label class="form-label">Nombre</label><input class="form-input" id="multi_nombre" placeholder="Tu nombre"></div>
      <div class="form-field"><label class="form-label">Teléfono</label><input class="form-input" id="multi_tel" type="tel" placeholder="+54 9 11…"></div>
      <div class="form-field"><label class="form-label">Vehículo / Propiedad</label><input class="form-input" id="multi_vehiculo" placeholder="Descripción general"></div>
      <div class="form-field full"><label class="form-label">Notas</label><input class="form-input" id="multi_notas" placeholder="Consulta, dirección, etc."></div>
    `;
  }
  document.getElementById('formGrid').innerHTML = html;
  document.querySelectorAll('.form-input').forEach(i=>i.addEventListener('input',()=>updateProgress(i)));
}

function getField(id){ return (document.getElementById(id)?.value||'').trim(); }

function updateProgress(){
  const inputs = document.querySelectorAll('.form-input');
  const filled = [...inputs].filter(i=>i.value.trim()).length;
  const pct = Math.round(filled/inputs.length*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
}

/* ── ESCAPE HTML (previene XSS al inyectar en innerHTML) ── */
function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── SANITIZAR ENTRADA DE USUARIO para mensajes WA ── */
function sanitizeWA(s) {
  if (s == null) return '';
  // Limitar longitud de campo individual y eliminar caracteres de control
  return String(s).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '').trim().slice(0, 200);
}

/* ── ENVIAR WA ── */
function enviarWA(){
  let nombre, tel, vehiculo, notas;
  const isMulti = saved.length > 1;

  if(!isMulti && saved.length===1){
    // Static IDs branch
    const f = ['f0_nombre','f0_tel','f0_marca','f0_modelo','f0_notas'];
    nombre  = sanitizeWA(getField(f[0]));
    tel     = sanitizeWA(getField(f[1]));
    const marca  = sanitizeWA(getField(f[2]));
    const modelo = sanitizeWA(getField(f[3]));
    vehiculo = [marca,modelo].filter(Boolean).join(' — ');
    notas   = sanitizeWA(getField(f[f.length-1]));
  } else {
    // Dynamic tab branch
    const tab = 'multi';
    nombre   = sanitizeWA(getField(tab+'_nombre'));
    tel      = sanitizeWA(getField(tab+'_tel'));
    vehiculo = sanitizeWA(getField(tab+'_vehiculo'));
    notas    = sanitizeWA(getField(tab+'_notas'));
  }

  const total = saved.reduce((a,s)=>a+s.price,0);
  const servicios = saved.map(s=>`• ${s.name}: ${fmtPrice(s.price)}`).join('\n');

  const msg = [
    `Hola ${CONFIG.nombre_negocio}! 👋`,
    `Soy ${nombre||'(sin nombre)'}${tel?' — '+tel:''}`,
    vehiculo ? `Vehículo/Propiedad: ${vehiculo}` : '',
    '',
    `Estoy interesado en:`,
    servicios,
    '',
    `Total estimado: ${fmtPrice(total)}`,
    notas ? `\nNotas: ${notas}` : '',
  ].filter(l=>l!==null&&l!==undefined).join('\n');

  const url = `https://wa.me/${CONFIG.telefono}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

/* ── VIEW SWITCH ── */
function switchView(v){
  currentView = v;
  document.getElementById('viewCatalog').style.display = v==='catalog'?'block':'none';
  document.getElementById('viewSaved').style.display   = v==='saved'?'block':'none';
  document.getElementById('tab-catalog').classList.toggle('active', v==='catalog');
  document.getElementById('tab-saved').classList.toggle('active',   v==='saved');
}

/* ── FORMAT ── */
function fmtPrice(n){ return '$'+n.toLocaleString('es-AR'); }

/* ── LISTENERS ── */
document.querySelectorAll('.form-input').forEach(i=>i.addEventListener('input', t => updateProgress(t)));
renderSavedList();
updateShareBox(loadServices());
</script>
